    pause_gate: true
    branch_name: "feature/v0.0.8-codeowners"
    intent: "Apply branch protection rules and establish code ownership"
    evidence: ["git:9a43fa0", "git:810b948"]
    merge_strategy: "squash"
    tag_ref: "v0.0.8"
    steps:
      - action: "make-repository-public"
        commands:
          - "gh repo edit finnoybu/finnoybu-org --visibility public --accept-visibility-change-consequences"
        note: "Required for branch protection API on free tier"
      
      - action: "create-codeowners"
        file: ".github/CODEOWNERS"
        content:
          - "# Canonical Doctrine"
          - "/canon/ @finnoybu"
          - ""
          - "# All Code"
          - "* @finnoybu"
      
      - action: "create-branch-protection-config"
        file: ".github/branch_protection.json"
        content:
          - "required_conversation_resolution: true"
          - "allow_force_pushes: false"
          - "allow_deletions: false"
          - "required_pull_request_reviews: {required_approving_review_count: 0, require_last_push_approval: true, dismiss_stale_reviews: true, require_code_owner_reviews: true}"
          - "enforce_admins: true"
          - "required_status_checks: {contexts: ['CI / build'], strict: true}"
          - "required_linear_history: true"
          - "allow_squash_merge: true"
          - "allow_merge_commit: false"
          - "allow_rebase_merge: false"
      
      - action: "apply-branch-protection"
        commands:
          - "gh api repos/finnoybu/finnoybu-org/branches/main/protection --input .github/branch_protection.json -X PUT"
      
      - action: "create-pr-for-codeowners"
        commands:
          - "git checkout -b feature/v0.0.8-codeowners"
          - "git add .github/CODEOWNERS .github/branch_protection.json"
          - "git commit -m 'v0.0.8 - Add CODEOWNERS for production guardrails'"
          - "git push origin feature/v0.0.8-codeowners"
          - "gh pr create --title 'v0.0.8 - Add CODEOWNERS' --body 'Establish code ownership and branch protection'"
      
      - action: "merge-pr"
        commands:
          - "Wait for CI checks to pass"
          - "gh pr merge 1 --squash"
        note: "May require temporarily removing branch protection due to review requirements"
      
      - action: "tag-release"
        commands:
          - "git checkout main"
          - "git pull origin main"
          - "git tag -a v0.0.8 -m 'v0.0.8 - Branch protection and CODEOWNERS governance'"
          - "git push origin v0.0.8"
      
      - action: "verify"
        commands:
          - "gh repo view --json nameWithOwner,isPrivate,visibility"
          - "Confirm visibility: PUBLIC"
          - "Check GitHub branch protection rules on main"

