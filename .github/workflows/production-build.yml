name: CD - Production Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  production-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run production build
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Verify build artifacts
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Production build failed - .next directory not found"
            exit 1
          fi
          echo "✅ Production build successful"
          echo "Build artifacts ready for deployment"
      
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ steps.get_version.outputs.version }}
          path: |
            .next/
            public/
            package.json
            package-lock.json
          retention-days: 30
      
      - name: Build summary
        run: |
          echo "## 🚀 Production Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Node:** ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Build artifacts:** Uploaded for 30 days" >> $GITHUB_STEP_SUMMARY
